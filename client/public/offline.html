<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Hibi Matcha - ออฟไลน์</title>
  <meta name="theme-color" content="#2d5a27">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans Thai', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #f7faf5 0%, #e8f0e4 50%, #d4e6ce 100%);
      color: #1a3a18;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 1.5rem;
      padding-top: calc(1.5rem + env(safe-area-inset-top));
      padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));
    }
    .container {
      text-align: center;
      max-width: 360px;
      animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(45, 90, 39, 0.15);
    }
    .icon-circle {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.25rem;
      background: rgba(45, 90, 39, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-circle svg {
      width: 32px;
      height: 32px;
      color: #2d5a27;
    }
    h1 {
      font-size: 1.375rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #2d5a27;
    }
    p {
      font-size: 0.9375rem;
      color: #5a7a56;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      background: #2d5a27;
      color: white;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: 0.875rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(45, 90, 39, 0.25);
    }
    .btn-primary:hover { background: #1e3d1a; box-shadow: 0 4px 12px rgba(45, 90, 39, 0.35); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary svg { width: 18px; height: 18px; }
    .status {
      margin-top: 1.5rem;
      font-size: 0.8125rem;
      color: #8a9a86;
    }
    .status.online {
      color: #2d5a27;
      font-weight: 500;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    .loading .spinner { display: block; }
    .loading .btn-text { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <img
      class="logo"
      src="https://d2xsxph8kpxj0f.cloudfront.net/310419663029164707/Vnv2Yn9Lbgw8vJ5BLPM68j/icon-192x192_1932d4fd.png"
      alt="Hibi Matcha"
      onerror="this.style.display='none'"
    />
    <div class="icon-circle">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z" />
      </svg>
    </div>
    <h1>ไม่มีการเชื่อมต่ออินเทอร์เน็ต</h1>
    <p>กรุณาตรวจสอบ Wi-Fi หรือข้อมูลมือถือ แล้วลองใหม่อีกครั้ง</p>
    <button class="btn-primary" id="retryBtn" onclick="retryConnection()">
      <span class="btn-text">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182" />
        </svg>
        ลองใหม่อีกครั้ง
      </span>
      <span class="spinner"></span>
    </button>
    <p class="status" id="status">กำลังตรวจสอบการเชื่อมต่อ...</p>
  </div>

  <script>
    function retryConnection() {
      const btn = document.getElementById('retryBtn');
      const status = document.getElementById('status');
      btn.classList.add('loading');
      status.textContent = 'กำลังเชื่อมต่อ...';
      status.className = 'status';

      fetch('/', { method: 'HEAD', cache: 'no-store' })
        .then(() => {
          status.textContent = 'เชื่อมต่อสำเร็จ! กำลังโหลด...';
          status.className = 'status online';
          setTimeout(() => window.location.reload(), 500);
        })
        .catch(() => {
          btn.classList.remove('loading');
          status.textContent = 'ยังไม่สามารถเชื่อมต่อได้ กรุณาลองอีกครั้ง';
          status.className = 'status';
        });
    }

    // Auto-retry when connection comes back
    window.addEventListener('online', () => {
      document.getElementById('status').textContent = 'ตรวจพบการเชื่อมต่อ! กำลังโหลด...';
      document.getElementById('status').className = 'status online';
      setTimeout(() => window.location.reload(), 1000);
    });

    // Check initial status
    if (navigator.onLine) {
      document.getElementById('status').textContent = 'มีสัญญาณ แต่เซิร์ฟเวอร์อาจไม่ตอบสนอง';
    } else {
      document.getElementById('status').textContent = 'ไม่มีสัญญาณอินเทอร์เน็ต';
    }
  </script>
</body>
</html>
